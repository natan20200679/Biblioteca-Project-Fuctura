{% extends 'biblioteca/base.html' %}

{% load static %}
{% block extra_styles %}
<link rel="stylesheet" type="text/css" href="{% static 'formularios/formularios.css' %}">
{% endblock %}

{% block content %}
<form method="post">
    <div class="titulo">
        <h2>Cadastro de Livro</h2>
        <a href="{% url 'livros' %}" class="btn">Voltar</a>
    </div>
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Salvar</button>
</form>
{% endblock %}
